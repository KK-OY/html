<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap通用样式</title>
    <!-- 引入Bootstrap CSS -->
    <link href="bootstrap-5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 自定义div样式 */
        .tangshi {
            width: 130px;
            height: 210px;
            float: left;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Bootstrap通用样式</h1>
        
        <!-- 第一个div - 春夜喜雨 -->
        <div class="tangshi border border-primary bg-secondary p-4 m-2 text-danger">
            <h3 class="fw-bold">春夜喜雨</h3>
            <p>好雨知时节，</p>
            <p>当春乃发生。</p>
            <p>随风潜入夜，</p>
            <p>润物细无声。</p>
        </div>
        
        <!-- 第二个div - 锄禾 -->
        <div class="tangshi border border-primary bg-secondary p-4 m-2 text-danger">
            <h3 class="fw-bold">锄禾</h3>
            <p>锄禾日当午，</p>
            <p>汗滴禾下土。</p>
            <p>谁知盘中餐，</p>
            <p>粒粒皆辛苦。</p>
        </div>
    </div>
</body>
</html>
